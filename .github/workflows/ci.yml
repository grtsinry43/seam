name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: golangci/golangci-lint-action@v9
        with:
          install-mode: binary
          version: v2.10
          args: --help

      - uses: extractions/setup-just@v3

      - name: Install chore-cli
        run: cargo install chore-cli

      - name: Format check
        run: just fmt-check

      - name: Lint (oxlint + Go + deps + links)
        run: just lint-check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: extractions/setup-just@v3

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM + TS
        run: just build-wasm && just build-ts

      - name: ESLint (requires build artifacts)
        run: just lint-eslint

      - name: Typecheck
        run: just typecheck

      - name: Clippy
        run: just lint-clippy

      - name: Rust unit tests
        run: just test-rs

      - name: TS unit tests
        run: just test-ts

      - name: Go unit tests
        run: just test-go

      - name: Build CLI
        run: just build-cli-install

      - name: Build fixtures
        run: just build-fixtures

      - name: Go integration tests
        run: just test-integration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Playwright E2E
        run: just test-e2e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
